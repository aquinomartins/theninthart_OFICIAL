name: Build Story Engine

on:
  workflow_dispatch:

jobs:
  build-story-engine:
    name: Build Angular Story Engine for shared hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/story-engine/package-lock.json

      - name: Diagnose package lock synchronization
        working-directory: frontend/story-engine
        run: |
          node -e "const p=require('./package.json'); const l=require('./package-lock.json'); const deps={...p.dependencies,...p.devDependencies}; const problems=[]; for (const [name] of Object.entries(deps)) { const locked=l.packages && l.packages['node_modules/'+name]; if (!locked) problems.push(name+' missing from lockfile'); } if (problems.length) { console.log('package-lock divergence candidates:'); console.log(problems.join('\n')); } else { console.log('No missing top-level dependencies detected in package-lock.json.'); }"

      - name: Install dependencies and synchronize lockfile
        working-directory: frontend/story-engine
        run: npm install

      - name: Report lockfile changes
        run: |
          if ! git diff --quiet -- frontend/story-engine/package-lock.json; then
            echo '::warning::frontend/story-engine/package-lock.json changed after npm install and should be committed.'
            git diff -- frontend/story-engine/package-lock.json
          else
            echo 'package-lock.json unchanged after npm install.'
          fi

      - name: Run Story Engine tests
        working-directory: frontend/story-engine
        run: npm test

      - name: Build real Angular Story Engine host assets
        working-directory: frontend/story-engine
        run: npm run build:host

      - name: Validate Story Engine artifact manifest and bundles
        run: |
          node scripts-build/verify-story-engine-assets.js
          node --check scripts/story-engine-loader.js
          node --check scripts/dashboard-story-bridge.js
          php scripts-build/package-shared-hosting.php check

      - name: Upload shared-hosting Story Engine artifact
        uses: actions/upload-artifact@v4
        with:
          name: story-engine-shared-hosting
          path: assets/story-engine/
          if-no-files-found: error
          retention-days: 14
